x-common-logging: &common-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "5"

services:
  labbar:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: labbar
    network_mode: host
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    stdin_open: true
    tty: true
    environment:
      ROS_LOG_DIR: /workspace/log
      ROS_DOMAIN_ID: "0"
      GZ_PARTITION: labbar
      DISPLAY: ${DISPLAY:-:0}
      XAUTHORITY: /tmp/.Xauthority
      QT_X11_NO_MITSHM: 1
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      # X11 for RViz / Gazebo GUI (works on Wayland via XWayland)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/tmp/.Xauthority:ro
      # Workspace: entire labbar repo mounted at /workspace
      - ..:/workspace:rw
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-109}"
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging: *common-logging
